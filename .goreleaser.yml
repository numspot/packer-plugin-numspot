version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: 'packer-plugin-numspot_v{{ .Version }}_x5.0'

archives:
  - format: zip
    name_template: 'packer-plugin-numspot_{{ .Version }}_x5.0_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'packer-plugin-numspot_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "2C94D4BACDDB847D24011B33A1B76CA592B149C5"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: false

changelog:
  disable: true
